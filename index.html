<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أحمد ياسر | النسخة الاحترافية 🇸🇩</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; transition: 0.3s; }
        .owner-signature { background: linear-gradient(135deg, #15803d 0%, #166534 100%); }
        .name-gradient { background: linear-gradient(to right, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        #side-menu, #cart-sidebar { transform: translateX(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        #side-menu.active, #cart-sidebar.active { transform: translateX(0); }
        .sale-banner { background: linear-gradient(90deg, #ef4444, #b91c1c); animation: slideText 15s linear infinite; }
        @keyframes slideText { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
        .product-card { transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-10px); }
    </style>
</head>
<body class="bg-gray-50 pb-40">

    <div class="bg-red-600 text-white text-[10px] py-1 overflow-hidden sticky top-0 z-[60]">
        <div class="whitespace-nowrap inline-block animate-pulse px-4">
             🔥 عروض حصرية لفترة محدودة بمناسبة الافتتاح - متجر أحمد ياسر يرحب بكم 🔥
        </div>
    </div>

    <div id="side-menu" class="fixed top-0 right-0 h-full w-72 bg-white shadow-2xl z-[300] p-6">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-bold text-green-700">أحمد ياسر ✨</h2>
            <button onclick="toggleMenu()" class="text-2xl text-gray-300">✕</button>
        </div>
        <nav class="space-y-4 font-bold text-gray-600">
            <button onclick="window.open('https://wa.me/249968359011')" class="w-full text-right p-4 hover:bg-green-50 rounded-2xl transition flex items-center justify-between">
                مركز الدعم 🎧 <span>></span>
            </button>
            <button onclick="window.open('https://wa.me/249968359011')" class="w-full text-right p-4 hover:bg-red-50 rounded-2xl transition text-red-500 flex items-center justify-between">
                تقديم شكوى ⚠️ <span>></span>
            </button>
        </nav>
    </div>

    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-80 bg-white shadow-2xl z-[300] p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h2 class="text-xl font-bold italic text-green-700">سلة المشتريات 🛒</h2>
            <button onclick="toggleCart()" class="text-2xl text-red-500">✕</button>
        </div>
        <div id="cart-items" class="space-y-4"></div>
        <div class="mt-8 border-t pt-4">
            <div class="flex justify-between font-bold text-lg mb-4">
                <span>الإجمالي:</span>
                <span id="cart-total" class="text-green-600">0</span>
            </div>
            <button onclick="checkout()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold shadow-xl active:scale-95 transition">إتمام الطلب (واتساب)</button>
        </div>
    </div>

    <nav class="bg-green-700 text-white p-4 shadow-xl sticky top-[24px] z-50">
        <div class="container mx-auto flex justify-between items-center">
            <button onclick="toggleMenu()" class="text-2xl p-2 bg-green-800 rounded-xl">☰</button>
            <h1 class="text-lg font-bold">سُوق أحمد ياسر 🇸🇩</h1>
            <div onclick="toggleCart()" class="bg-green-900 p-2 rounded-full cursor-pointer relative">
                🛒 <span id="cart-count" class="absolute -top-1 -right-1 bg-yellow-400 text-black text-[9px] rounded-full px-1.5 font-bold">0</span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 mt-8">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="products-grid"></div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 owner-signature text-white py-4 px-6 z-[150] border-t border-white/10">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-[9px] text-green-200 uppercase font-bold">المالك الرسمي</span>
                <h2 class="text-lg name-gradient">أحمد ياسر 👑</h2>
            </div>
            <button onclick="shareStore()" class="bg-white/20 px-4 py-2 rounded-full text-xs font-bold border border-white/30">مشاركة المتجر 🔗</button>
        </div>
    </footer>

    <script>
        const myNumber = "249968359011";
        let cart = [];
        let favorites = JSON.parse(localStorage.getItem('userFavs')) || [];

        const products = [
            { id: 1, name: "آيفون 13 برو نظيف", price: 600000, img: "https://images.unsplash.com/photo-1633333008411-4e78d53ca419?w=400" },
            { id: 2, name: "ساعة ذكية Ultra", price: 45000, img: "https://images.unsplash.com/photo-1617043786394-f977fa12eddf?w=400" },
            { id: 3, name: "لابتوب HP Core i7", price: 280000, img: "https://images.unsplash.com/photo-1588872657578-7efd1f1555ed?w=400" }
        ];

        function renderProducts(data) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            data.forEach(p => {
                const isFav = favorites.includes(p.id);
                grid.innerHTML += `
                    <div class="bg-white rounded-[2.5rem] shadow-xl p-3 relative product-card">
                        <button onclick="toggleFav(${p.id})" class="absolute top-5 right-5 z-10 bg-white/90 p-2 rounded-full shadow-md ${isFav ? 'text-red-500' : 'text-gray-300'}">❤️</button>
                        <img src="${p.img}" class="w-full h-56 object-cover rounded-[2rem] mb-4">
                        <div class="px-2">
                            <h4 class="font-bold text-lg">${p.name}</h4>
                            <p class="text-green-600 font-bold text-xl mb-4">${p.price.toLocaleString()} <span class="text-[10px]">ج.س</span></p>
                            <div class="flex gap-2">
                                <button onclick="addToCart('${p.name}', ${p.price})" class="flex-1 bg-gray-800 text-white py-4 rounded-2xl font-bold hover:bg-black transition">أضف للسلة</button>
                                <button onclick="shareProduct('${p.name}')" class="bg-gray-100 p-4 rounded-2xl">📤</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function addToCart(name, price) {
            cart.push({name, price});
            document.getElementById('cart-count').innerText = cart.length;
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            list.innerHTML = '';
            let total = 0;
            cart.forEach((item, i) => {
                total += item.price;
                list.innerHTML += `
                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-2xl mb-2">
                    <span class="text-sm font-bold">${item.name}</span>
                    <button onclick="cart.splice(${i}, 1); updateCartUI(); document.getElementById('cart-count').innerText = cart.length;" class="text-red-400 font-bold">🗑️</button>
                </div>`;
            });
            totalEl.innerText = total.toLocaleString() + " ج.س";
        }

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('active'); }
        
        function shareProduct(name) {
            const text = "يا صديقي، انظر لهذا المنتج الرائع في متجر أحمد ياسر: " + name;
            window.open("https://wa.me/?text=" + encodeURIComponent(text + " " + window.location.href));
        }

        function shareStore() {
            const text = "مرحباً! تفضل بزيارة متجر أحمد ياسر، أفضل المنتجات والأسعار في السودان 🇸🇩:";
            window.open("https://wa.me/?text=" + encodeURIComponent(text + " " + window.location.href));
        }

        function checkout() {
            if(cart.length === 0) return alert("السلة فارغة!");
            let msg = "أهلاً أحمد ياسر، أريد طلب:%0A";
            cart.forEach(item => msg += "- " + item.name + "%0A");
            msg += "%0A*الإجمالي:* " + document.getElementById('cart-total').innerText;
            window.open("https://wa.me/" + myNumber + "?text=" + msg);
        }

        function toggleFav(id) {
            if (favorites.includes(id)) favorites = favorites.filter(fid => fid !== id);
            else favorites.push(id);
            localStorage.setItem('userFavs', JSON.stringify(favorites));
            renderProducts(products);
        }

        window.onload = () => renderProducts(products);
    </script>
</body>
</html>
