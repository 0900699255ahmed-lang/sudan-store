<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر سودان | Sudan Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="bg-blue-700 text-white shadow-lg p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-widest">سُودان 🇸🇩</h1>
            <div class="space-x-4 space-x-reverse">
                <button class="bg-white text-blue-700 px-4 py-1 rounded-lg font-bold">دخول</button>
            </div>
        </div>
    </nav>

    <header class="bg-blue-600 text-white py-16 px-4 text-center">
        <h2 class="text-4xl font-bold mb-4">أهلاً بك في مستقبل التسوق في السودان</h2>
        <p class="text-xl opacity-90">منتجات أصلية، توصيل سريع، ودفع عند الاستلام</p>
    </header>

    <main class="container mx-auto p-6">
        <h3 class="text-2xl font-bold mb-8 border-b-2 border-blue-500 inline-block">أحدث المنتجات</h3>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition">
                <div class="h-48 bg-gray-200 flex items-center justify-center text-gray-500">صورة المنتج 360°</div>
                <div class="p-4">
                    <h4 class="font-bold text-lg">هاتف ذكي حديث</h4>
                    <p class="text-blue-600 font-bold mt-2">150,000 ج.س</p>
                    <button class="w-full mt-4 bg-blue-700 text-white py-2 rounded-lg hover:bg-blue-800">أضف للسلة</button>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition">
                <div class="h-48 bg-gray-200 flex items-center justify-center text-gray-500">أدوات منزلية</div>
                <div class="p-4">
                    <h4 class="font-bold text-lg">خلاط كهربائي أصلي</h4>
                    <p class="text-blue-600 font-bold mt-2">45,000 ج.س</p>
                    <button class="w-full mt-4 bg-blue-700 text-white py-2 rounded-lg hover:bg-blue-800">أضف للسلة</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 text-white text-center py-8 mt-12">
        <p>جميع الحقوق محفوظة لمتجر سودان © 2026</p>
    </footer>
</body>
</html>
