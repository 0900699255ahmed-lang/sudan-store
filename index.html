<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق السودان الذكي 🇸🇩</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="login-modal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 text-center shadow-2xl">
            <h2 class="text-xl font-bold mb-4">مرحباً بك في متجرنا ✨</h2>
            <p class="text-gray-500 text-sm mb-6">من فضلك ادخل اسمك لمرة واحدة فقط</p>
            <input type="text" id="user-name-input" placeholder="اسمك الكريم" class="w-full p-4 bg-gray-100 rounded-2xl mb-4 outline-none border-2 border-transparent focus:border-green-500">
            <button onclick="saveAndEnter()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold shadow-lg">دخول المتجر</button>
        </div>
    </div>

    <nav class="bg-green-700 text-white p-4 shadow-xl flex justify-between items-center sticky top-0 z-50">
        <div>
            <h1 class="text-lg font-bold">مَتجر السودان 🇸🇩</h1>
            <p id="top-welcome" class="text-[10px]"></p>
        </div>
        <button onclick="clearData()" class="text-[10px] bg-red-500 px-2 py-1 rounded">تبديل الحساب</button>
    </nav>

    <main class="container mx-auto p-4 text-center mt-10">
        <div id="status-icon" class="text-5xl mb-4">👋</div>
        <h2 id="main-welcome" class="text-2xl font-bold text-gray-800"></h2>
        <p class="text-gray-500 mt-2">يسعدنا عودتك مرة أخرى!</p>
        
        <div class="mt-8 bg-white p-6 rounded-3xl shadow-md inline-block">
            <p class="text-sm">بياناتك محفوظة بأمان في متصفحك. لن تحتاج للتسجيل مرة أخرى عند العودة.</p>
        </div>
    </main>

    <script>
        // هذه الوظيفة تعمل فور فتح الصفحة
        window.onload = function() {
            const savedName = localStorage.getItem('userName');
            
            if (savedName) {
                // إذا كان الزبون مسجل سابقاً
                showDashboard(savedName);
            } else {
                // إذا كان زبون جديد
                document.getElementById('login-modal').classList.remove('hidden');
            }
        }

        function saveAndEnter() {
            const name = document.getElementById('user-name-input').value;
            if (name.length < 2) return alert("الرجاء كتابة اسمك");
            
            // حفظ الاسم في ذاكرة المتصفح للأبد
            localStorage.setItem('userName', name);
            
            document.getElementById('login-modal').classList.add('hidden');
            showDashboard(name);
        }

        function showDashboard(name) {
            document.getElementById('top-welcome').innerText = "مرحباً بك، " + name;
            document.getElementById('main-welcome').innerText = "أهلاً بك مجدداً يا " + name;
            document.getElementById('status-icon').innerText = "✅";
        }

        // وظيفة لمسح البيانات (إذا أراد الزبون الخروج)
        function clearData() {
            if(confirm("هل تريد مسح بياناتك من هذا المتصفح؟")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
