<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق السودان - معرض الصور 🇸🇩</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-100 pb-24">

    <nav class="bg-green-700 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between">
        <h1 class="text-xl font-bold">سُوق السودان 🇸🇩</h1>
        <div id="cart-icon" class="relative bg-green-900 p-2 rounded-full cursor-pointer">
            🛒 <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-[10px] rounded-full px-1">0</span>
        </div>
    </nav>

    <main class="container mx-auto px-4 mt-8">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="products-grid"></div>
    </main>

    <script>
        // مصفوفة المنتجات مع تعدد الصور (Array of Images)
        const products = [
            {
                name: "آيفون 13 برو نظيف",
                price: 600000,
                images: [
                    "https://images.unsplash.com/photo-1633333008411-4e78d53ca419?w=400",
                    "https://images.unsplash.com/photo-1616348436168-de43ad0db179?w=400",
                    "https://images.unsplash.com/photo-1512499617640-c74ae3a79d37?w=400"
                ]
            }
        ];

        function render() {
            const grid = document.getElementById('products-grid');
            products.forEach((p, pIndex) => {
                grid.innerHTML += `
                <div class="bg-white rounded-3xl shadow-lg p-3 border border-gray-100 overflow-hidden">
                    <div class="relative overflow-hidden rounded-2xl h-56 group">
                        <div id="slider-${pIndex}" class="flex transition-transform duration-500 ease-in-out h-full">
                            ${p.images.map(img => `<img src="${img}" class="w-full h-full object-cover flex-shrink-0">`).join('')}
                        </div>
                        <button onclick="moveSlider(${pIndex}, -1)" class="absolute left-2 top-1/2 -translate-y-1/2 bg-black/30 text-white p-2 rounded-full hover:bg-black/50">❮</button>
                        <button onclick="moveSlider(${pIndex}, 1)" class="absolute right-2 top-1/2 -translate-y-1/2 bg-black/30 text-white p-2 rounded-full hover:bg-black/50">❯</button>
                    </div>

                    <h4 class="font-bold text-lg mt-4">${p.name}</h4>
                    <p class="text-green-600 font-bold text-xl mb-4">${p.price.toLocaleString()} ج.س</p>
                    
                    <div class="flex gap-2">
                        <button onclick="window.open('https://wa.me/249968359011?text=' + encodeURIComponent('استفسار عن ' + '${p.name}'))" class="flex-1 bg-green-500 text-white py-3 rounded-2xl font-bold">💬 استفسار</button>
                        <button onclick="alert('تمت الإضافة للسلة')" class="bg-gray-800 text-white p-3 rounded-2xl text-sm font-bold">🛒 للسلة</button>
                    </div>
                </div>`;
            });
        }

        // منطق تحريك الصور
        let sliderPositions = products.map(() => 0);
        function moveSlider(pIndex, direction) {
            const slider = document.getElementById('slider-' + pIndex);
            const totalImages = products[pIndex].images.length;
            
            sliderPositions[pIndex] += direction;
            
            if (sliderPositions[pIndex] >= totalImages) sliderPositions[pIndex] = 0;
            if (sliderPositions[pIndex] < 0) sliderPositions[pIndex] = totalImages - 1;
            
            slider.style.transform = "translateX(" + (sliderPositions[pIndex] * 100) + "%)";
        }

        render();
    </script>
</body>
</html>
