<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أحمد ياسر | نظام احترافي 🇸🇩</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; transition: 0.3s; }
        .dark { background-color: #111827; color: white; }
        .owner-signature { background: linear-gradient(135deg, #15803d 0%, #166534 100%); }
        .name-gradient { background: linear-gradient(to right, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .cart-modal { transform: translateX(100%); transition: 0.4s ease-in-out; }
        .cart-modal.active { transform: translateX(0); }
    </style>
</head>
<body class="bg-gray-50 pb-40" id="body">

    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-80 bg-white shadow-2xl z-[250] cart-modal p-6 overflow-y-auto dark:bg-gray-800">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">سلتي 🛒</h2>
            <button onclick="toggleCart()" class="text-2xl text-red-500">✕</button>
        </div>
        <div id="cart-items" class="space-y-4 mb-6">
            </div>
        <div class="border-t pt-4">
            <div class="flex justify-between font-bold mb-4">
                <span>الإجمالي:</span>
                <span id="cart-total">0</span> ج.س
            </div>
            <button onclick="checkout()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold shadow-lg">تأكيد الطلب واتساب 🚀</button>
        </div>
    </div>

    <nav class="bg-green-700 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center mb-4">
            <div>
                <h1 class="text-xl font-bold">سُوق السودان 🇸🇩</h1>
                <p id="top-welcome" class="text-[10px] opacity-90"></p>
            </div>
            <div class="flex items-center space-x-3 space-x-reverse">
                <button onclick="document.getElementById('body').classList.toggle('dark')" class="p-2 bg-green-800 rounded-full">🌙</button>
                <div onclick="toggleCart()" class="relative bg-green-900 p-2 rounded-full cursor-pointer">
                    🛒 <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-[10px] rounded-full px-1">0</span>
                </div>
            </div>
        </div>
        <input type="text" id="search-input" onkeyup="searchProducts()" placeholder="ابحث في متجر أحمد ياسر..." class="w-full p-3 rounded-2xl text-black outline-none shadow-lg">
    </nav>

    <main class="container mx-auto px-4 mt-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="products-grid"></main>

    <footer class="fixed bottom-0 left-0 right-0 owner-signature text-white py-4 px-6 z-[150] border-t border-green-500/30">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-[10px] text-green-200 opacity-80 uppercase font-bold">المؤسس</span>
                <h2 class="text-lg">
                    <span class="name-gradient">أحمد ياسر</span>
                    <span class="text-[10px] mr-1 bg-black/20 px-2 py-0.5 rounded-full">👑 مالك المتجر</span>
                </h2>
            </div>
            <button onclick="customRequest()" class="bg-yellow-400 text-black px-4 py-2 rounded-full text-xs font-bold shadow-md">ارفع طلبك +</button>
        </div>
    </footer>

    <script>
        const myNumber = "249968359011";
        let cart = [];

        const products = [
            { name: "آيفون 13 برو نظيف", price: 600000, img: "https://images.unsplash.com/photo-1633333008411-4e78d53ca419?w=400" },
            { name: "ساعة ذكية Ultra", price: 45000, img: "https://images.unsplash.com/photo-1617043786394-f977fa12eddf?w=400" }
        ];

        function renderProducts(data) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            data.forEach((p, i) => {
                grid.innerHTML += `
                    <div class="bg-white dark:bg-gray-800 rounded-[2rem] shadow-xl p-3 border border-gray-100 dark:border-gray-700 overflow-hidden">
                        <img src="${p.img}" class="w-full h-52 object-cover rounded-[1.5rem] mb-4">
                        <h4 class="font-bold text-lg mb-1 px-2">${p.name}</h4>
                        <p class="text-green-600 font-bold text-xl mb-4 px-2">${p.price.toLocaleString()} ج.س</p>
                        <div class="flex gap-2">
                            <button onclick="addToCart('${p.name}', ${p.price})" class="flex-1 bg-gray-800 text-white py-3 rounded-2xl font-bold">أضف للسلة 🛒</button>
                            <button onclick="ask('${p.name}')" class="bg-green-500 text-white p-3 rounded-2xl">💬</button>
                        </div>
                    </div>`;
            });
        }

        function addToCart(name, price) {
            cart.push({name, price});
            updateCartUI();
            alert('تمت إضافة ' + name + ' لسلّتك ✅');
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const itemsList = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            itemsList.innerHTML = '';
            let total = 0;

            cart.forEach((item, index) => {
                total += item.price;
                itemsList.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-50 dark:bg-gray-700 p-3 rounded-xl">
                        <span class="text-xs font-bold">${item.name}</span>
                        <button onclick="removeFromCart(${index})" class="text-red-500">🗑️</button>
                    </div>`;
            });
            totalEl.innerText = total.toLocaleString();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('active'); }

        function checkout() {
            if(cart.length === 0) return alert("السلة فارغة!");
            let msg = "مرحباً أحمد ياسر، أريد طلب هذه المنتجات:%0A";
            cart.forEach(item => msg += "- " + item.name + "%0A");
            msg += "%0A*الإجمالي:* " + document.getElementById('cart-total').innerText + " ج.س";
            window.open("https://wa.me/" + myNumber + "?text=" + msg);
        }

        function customRequest() {
            window.open("https://wa.me/" + myNumber + "?text=" + encodeURIComponent("مرحباً أستاذ أحمد، لدي طلب خاص لمنتج غير موجود في المتجر. سأرسل لك تفاصيله وصورته الآن:"));
        }

        function ask(name) { window.open("https://wa.me/" + myNumber + "?text=" + encodeURIComponent("استفسار عن: " + name)); }
        function searchProducts() {
            const term = document.getElementById('search-input').value.toLowerCase();
            renderProducts(products.filter(p => p.name.toLowerCase().includes(term)));
        }

        window.onload = () => {
            renderProducts(products);
            const savedName = localStorage.getItem('userName');
            if (savedName) document.getElementById('top-welcome').innerText = "مرحباً، " + savedName;
        };
    </script>
</body>
</html>
