<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق السودان - تسجيل الدخول 🇸🇩</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .modal-active { overflow: hidden; }
    </style>
</head>
<body class="bg-gray-50 pb-24">

    <div id="login-modal" class="hidden fixed inset-0 bg-black/70 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl text-center">
            <h2 class="text-2xl font-bold text-green-700 mb-2">مرحباً بك في سوقنا 👋</h2>
            <p class="text-gray-500 mb-6 text-sm">سجل دخولك لتتمكن من الطلب بسهولة</p>
            
            <div class="space-y-4">
                <button onclick="fakeGoogleLogin()" class="w-full border-2 border-gray-100 flex items-center justify-center gap-3 py-3 rounded-2xl hover:bg-gray-50 transition">
                    <img src="https://www.svgrepo.com/show/355037/google.svg" class="w-5 h-5">
                    <span class="font-bold text-gray-700">التسجيل عبر جوجل</span>
                </button>
                
                <div class="flex items-center gap-2 text-gray-300 my-4">
                    <hr class="flex-1"> <span class="text-xs">أو بالإيميل</span> <hr class="flex-1">
                </div>

                <input type="text" id="user-name" placeholder="الاسم الكامل" class="w-full p-4 bg-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-green-500">
                <input type="email" id="user-email" placeholder="البريد الإلكتروني" class="w-full p-4 bg-gray-100 rounded-2xl outline-none">
                
                <button onclick="saveUser()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-green-700">دخول للمتجر</button>
            </div>
        </div>
    </div>

    <nav class="bg-green-700 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-lg font-bold">سُوق السودان 🇸🇩</h1>
                <p id="welcome-msg" class="text-[10px] opacity-80">مرحباً بك يا زائر</p>
            </div>
            <div class="bg-green-800 p-2 rounded-full cursor-pointer" onclick="logout()">👤</div>
        </div>
    </nav>

    <main class="container mx-auto px-4 mt-10">
        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <script>
        // التحقق من وجود مستخدم مسجل
        window.onload = function() {
            const savedName = localStorage.getItem('userName');
            if (!savedName) {
                document.getElementById('login-modal').classList.remove('hidden');
            } else {
                showWelcome(savedName);
            }
            renderProducts();
        }

        function saveUser() {
            const name = document.getElementById('user-name').value;
            if (name.length < 3) return alert("من فضلك ادخل اسمك الحقيقي");
            
            localStorage.setItem('userName', name);
            document.getElementById('login-modal').classList.add('hidden');
            showWelcome(name);
        }

        function showWelcome(name) {
            document.getElementById('welcome-msg').innerText = "مرحباً، " + name + " ✨";
        }

        function fakeGoogleLogin() {
            const name = prompt("محاكاة تسجيل جوجل: ما هو اسمك؟");
            if(name) {
                localStorage.setItem('userName', name);
                location.reload();
            }
        }

        function logout() {
            if(confirm("هل تريد تسجيل الخروج؟")) {
                localStorage.removeItem('userName');
                location.reload();
            }
        }

        const products = [
            {name: "آيفون 13 برو", price: 600000, img: "https://images.unsplash.com/photo-1633333008411-4e78d53ca419?w=400"}
        ];

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            products.forEach(p => {
                grid.innerHTML += `
                    <div class="bg-white rounded-3xl shadow-lg p-3 border border-gray-100">
                        <img src="${p.img}" class="w-full h-48 object-cover rounded-2xl mb-4">
                        <h4 class="font-bold text-lg">${p.name}</h4>
                        <p class="text-green-600 font-bold text-xl mb-4">${p.price.toLocaleString()} ج.س</p>
                        <button onclick="order('${p.name}')" class="w-full bg-green-600 text-white py-3 rounded-2xl font-bold hover:bg-green-700 transition">اطلب الآن</button>
                    </div>`;
            });
        }

        function order(prodName) {
            const user = localStorage.getItem('userName') || "زبون";
            const msg = "مرحباً، أنا " + user + " أريد طلب " + prodName;
            window.open("https://wa.me/249968359011?text=" + encodeURIComponent(msg));
        }
    </script>
</body>
</html>
