<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أحمد ياسر | المتكامل 🇸🇩</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; transition: 0.3s; overflow-x: hidden; }
        .owner-signature { background: linear-gradient(135deg, #15803d 0%, #166534 100%); }
        .name-gradient { background: linear-gradient(to right, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        /* أنيميشن القائمة الجانبية */
        #side-menu { transform: translateX(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        #side-menu.active { transform: translateX(0); }
        .favorite-active { color: #ef4444 !important; scale: 1.2; }
    </style>
</head>
<body class="bg-gray-50 pb-40">

    <div id="side-menu" class="fixed top-0 right-0 h-full w-72 bg-white shadow-2xl z-[300] p-6 dark:bg-gray-800">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-bold text-green-700">القائمة ☰</h2>
            <button onclick="toggleMenu()" class="text-2xl text-gray-400">✕</button>
        </div>
        <nav class="space-y-4">
            <button onclick="showFavorites()" class="w-full text-right flex items-center gap-3 p-4 hover:bg-gray-100 rounded-2xl transition">
                <span>❤️</span> المنتجات المفضلة
            </button>
            <button onclick="contactSupport('دعم فني')" class="w-full text-right flex items-center gap-3 p-4 hover:bg-gray-100 rounded-2xl transition">
                <span>🎧</span> مركز الدعم
            </button>
            <button onclick="contactSupport('تقديم شكوى')" class="w-full text-right flex items-center gap-3 p-4 hover:bg-gray-100 rounded-2xl transition text-red-600">
                <span>⚠️</span> تقديم شكوى
            </button>
        </nav>
    </div>

    <nav class="bg-green-700 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <button onclick="toggleMenu()" class="text-2xl p-2 bg-green-800 rounded-xl hover:bg-green-900 transition">☰</button>
            <h1 class="text-lg font-bold">مَتجر أحمد ياسر 🇸🇩</h1>
            <div class="flex gap-3">
                <div onclick="showFavorites()" class="cursor-pointer bg-green-800 p-2 rounded-full relative">
                    ❤️ <span id="fav-count" class="absolute -top-1 -right-1 bg-red-500 text-[9px] rounded-full px-1">0</span>
                </div>
                <div class="bg-green-900 p-2 rounded-full cursor-pointer relative">
                    🛒 <span id="cart-count" class="absolute -top-1 -right-1 bg-yellow-500 text-[9px] text-black rounded-full px-1 font-bold">0</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 mt-8">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="products-grid"></div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 owner-signature text-white py-4 px-6 z-[150] border-t border-green-500/30">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-[10px] text-green-200 opacity-80 uppercase font-bold">أحمد ياسر 👑</span>
                <span class="text-xs font-bold name-gradient italic">المالك الرسمي للمتجر</span>
            </div>
            <button onclick="window.open('tel:0968359011')" class="bg-white/10 p-3 rounded-full text-lg">📞</button>
        </div>
    </footer>

    <script>
        const myNumber = "249968359011";
        let favorites = JSON.parse(localStorage.getItem('userFavs')) || [];
        
        const products = [
            { id: 1, name: "آيفون 13 برو نظيف", price: 600000, img: "https://images.unsplash.com/photo-1633333008411-4e78d53ca419?w=400" },
            { id: 2, name: "ساعة ذكية Ultra", price: 45000, img: "https://images.unsplash.com/photo-1617043786394-f977fa12eddf?w=400" },
            { id: 3, name: "لابتوب HP Core i7", price: 280000, img: "https://images.unsplash.com/photo-1588872657578-7efd1f1555ed?w=400" }
        ];

        function render() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            products.forEach(p => {
                const isFav = favorites.includes(p.id);
                grid.innerHTML += `
                <div class="bg-white rounded-[2.5rem] shadow-lg p-3 relative group transition hover:scale-[1.02]">
                    <button onclick="toggleFav(${p.id})" class="absolute top-5 right-5 z-10 bg-white/80 p-2 rounded-full shadow-md ${isFav ? 'favorite-active' : 'text-gray-300'}">❤️</button>
                    <img src="${p.img}" class="w-full h-52 object-cover rounded-[2rem] mb-4">
                    <h4 class="font-bold text-lg mb-1 px-2">${p.name}</h4>
                    <p class="text-green-600 font-bold px-2 mb-4">${p.price.toLocaleString()} ج.س</p>
                    <button class="w-full bg-gray-800 text-white py-4 rounded-2xl font-bold hover:bg-black transition">أضف للسلة</button>
                </div>`;
            });
            document.getElementById('fav-count').innerText = favorites.length;
        }

        function toggleFav(id) {
            if (favorites.includes(id)) {
                favorites = favorites.filter(fid => fid !== id);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('userFavs', JSON.stringify(favorites));
            render();
        }

        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('active');
        }

        function contactSupport(type) {
            const user = localStorage.getItem('userName') || "زبون";
            const msg = "مرحباً أحمد ياسر، أريد " + type + " بخصوص المتجر. أنا الزبون: " + user;
            window.open("https://wa.me/" + myNumber + "?text=" + encodeURIComponent(msg));
        }

        function showFavorites() {
            if (favorites.length === 0) return alert("ليس لديك منتجات مفضلة بعد ❤️");
            const favItems = products.filter(p => favorites.includes(p.id)).map(p => p.name).join(', ');
            alert("منتجاتك المفضلة هي: " + favItems);
            toggleMenu();
        }

        window.onload = render;
    </script>
</body>
</html>
