<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق السودان الذكي 🇸🇩</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; transition: 0.3s; }
        .owner-signature {
            background: linear-gradient(135deg, #15803d 0%, #166534 100%);
            box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
        }
        .name-gradient {
            background: linear-gradient(to right, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
    </style>
</head>
<body class="bg-gray-50 pb-32">

    <nav class="bg-green-700 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold italic">سُوق السودان 🇸🇩</h1>
            <div id="cart-icon" class="bg-green-900 p-2 rounded-full cursor-pointer">🛒</div>
        </div>
    </nav>

    <main class="container mx-auto px-4 mt-10">
        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 owner-signature text-white py-4 px-6 z-[100] border-t border-green-600">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-[10px] text-green-200 opacity-80 uppercase tracking-widest">مؤسس المنصة</span>
                <h2 class="text-lg tracking-tight">
                    <span class="name-gradient">أحمد ياسر</span>
                    <span class="text-xs mr-1 opacity-90">👑 مالك المتجر</span>
                </h2>
            </div>
            <div class="text-[10px] text-left opacity-60">
                جميع الحقوق محفوظة <br> © 2024
            </div>
        </div>
    </footer>

    <script>
        const products = [
            {name: "آيفون 13 برو نظيف", price: 600000, img: "https://images.unsplash.com/photo-1633333008411-4e78d53ca419?w=400"}
        ];

        const grid = document.getElementById('products-grid');
        products.forEach(p => {
            grid.innerHTML += `
                <div class="bg-white rounded-3xl shadow-lg p-3 border border-gray-100 overflow-hidden">
                    <img src="${p.img}" class="w-full h-48 object-cover rounded-2xl mb-4">
                    <h4 class="font-bold text-lg">${p.name}</h4>
                    <p class="text-green-600 font-bold text-xl mb-4">${p.price.toLocaleString()} ج.س</p>
                    <button class="w-full bg-gray-800 text-white py-3 rounded-2xl font-bold">اطلب الآن</button>
                </div>`;
        });
    </script>
</body>
</html>
